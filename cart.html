<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Tag Manager -->
        <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-N5ZDZCR2');</script>
    <!-- End Google Tag Manager -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | FutbolGear</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <!-- Google Tag Manager (noscript) -->
        <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N5ZDZCR2"
        height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <nav class="bg-black text-white px-4 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-yellow-400">FUTBOLGEAR</a>
            <a href="index.html" class="font-semibold hover:text-yellow-400">← Return to Shop</a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-12">
        <h1 class="text-3xl font-black mb-8">Your Cart</h1>
        
        <div id="cart-contents" class="space-y-4">
            <!-- Items load dynamically -->
        </div>

        <div id="summary-card" class="mt-8 bg-white p-6 rounded-xl shadow-sm border border-gray-100 hidden">
            <div class="flex justify-between items-center mb-6 text-xl font-bold">
                <span>Subtotal:</span>
                <span id="cart-subtotal">$0.00</span>
            </div>
            <a href="checkout.html" class="block w-full bg-black text-white text-center font-bold py-4 rounded-xl hover:bg-gray-800 transition uppercase tracking-wide">
                Proceed to Checkout Securely →
            </a>
        </div>
    </main>

    <script>
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cart-contents');
        const summary = document.getElementById('summary-card');
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = `
                <div class="text-center py-12">
                    <p class="text-gray-500 text-lg mb-4">Your bag is empty.</p>
                    <a href="index.html" class="bg-black text-white px-6 py-3 rounded font-bold">Shop Popular Kits</a>
                </div>
            `;
        } else {
            summary.classList.remove('hidden');
            cart.forEach((item, index) => {
                total += item.price;
                const line = document.createElement('div');
                line.className = "bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between";
                
                // Pull variants out dynamically for clean tracking data representation
                const fitText = item.fit || "Unisex";
                const sizeText = item.size || "M";
                const colorText = item.color || "Home Kit";

                line.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <span class="text-4xl">${item.icon}</span>
                        <div>
                            <h4 class="font-bold text-gray-800 text-lg">${item.name}</h4>
                            <div class="text-xs text-gray-400 mt-1 space-x-2 font-medium">
                                <span class="bg-gray-100 px-2 py-0.5 rounded">Fit: ${fitText}</span>
                                <span class="bg-gray-100 px-2 py-0.5 rounded">Size: ${sizeText}</span>
                                <span class="bg-gray-100 px-2 py-0.5 rounded">Style: ${colorText}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center space-x-6">
                        <span class="font-black text-lg text-gray-900">$${item.price.toFixed(2)}</span>
                        <button onclick="removeItem(${index})" class="text-red-500 text-sm font-semibold hover:underline">Remove</button>
                    </div>
                `;
                container.appendChild(line);
            });
            document.getElementById('cart-subtotal').innerText = `$${total.toFixed(2)}`;
        }

        function removeItem(idx) {
            cart.splice(idx, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            window.location.reload();
        }
    </script>
</body>
</html>
