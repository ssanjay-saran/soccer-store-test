<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Collection | FutbolGear</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-black text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-wider text-yellow-400">FUTBOLGEAR</a>
            <div class="space-x-6 font-semibold">
                <a href="index.html" class="hover:text-yellow-400 transition">Home</a>
                <a href="team.html?team=all" class="hover:text-yellow-400 transition">Shop All</a>
                <a href="cart.html" class="hover:text-yellow-400 transition">Cart 🛒</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <h1 id="team-title" class="text-4xl font-black uppercase tracking-tight mb-2 text-center text-gray-900">Collection</h1>
        <p class="text-gray-600 text-center mb-12">Premium high-performance training gear and matchday apparel.</p>

        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Products injected by JavaScript -->
        </div>
    </main>

    <script>
        const teams = {
            "real-madrid": "Real Madrid", "barcelona": "Barcelona", "manchester-united": "Manchester United",
            "manchester-city": "Manchester City", "liverpool": "Liverpool", "arsenal": "Arsenal",
            "psg": "PSG", "bayern-munich": "Bayern Munich", "jed-juventus": "Juventus", "inter-miami": "Inter Miami"
        };

        const items = [
            { id: "jersey", name: "Official Match Jersey", price: 75, icon: "👕" },
            { id: "hoodie", name: "Club Fleece Hoodie", price: 85, icon: "🧥" },
            { id: "shorts", name: "Pre-Match Shorts", price: 45, icon: "🩳" },
            { id: "pants", name: "Elite Training Pants", price: 65, icon: "👖" },
            { id: "shoes", name: "Club Edition Sneakers", price: 120, icon: "👟" }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const teamId = urlParams.get('team') || 'all';
        const teamName = teams[teamId] || "All Teams";
        
        document.getElementById('team-title').innerText = `${teamName} Gear`;

        const grid = document.getElementById('products-grid');

        // Map items out. If 'all', mix them up.
        items.forEach(item => {
            const currentTeamId = teamId === 'all' ? 'real-madrid' : teamId;
            const currentTeamName = teamId === 'all' ? 'Featured' : teamName;
            
            const card = document.createElement('a');
            card.href = `product.html?team=${currentTeamId}&item=${item.id}`;
            card.className = "bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-xl transition flex flex-col justify-between group";

            // Static high-converting fake rating logic
            const fakeRating = (4.7 + Math.random() * 0.2).toFixed(1);
            const fakeVotes = Math.floor(200 + Math.random() * 400);

            card.innerHTML = `
                <div>
                    <div class="w-full h-48 bg-gray-100 rounded-lg flex items-center justify-center text-6xl mb-4 group-hover:scale-102 transition">
                        ${item.icon}
                    </div>
                    <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">${currentTeamName}</span>
                    <h3 class="font-bold text-xl mt-1 group-hover:text-blue-600 transition">${item.name}</h3>
                    <div class="flex items-center space-x-1 mt-2 text-sm text-yellow-500">
                        <span>⭐ ${fakeRating}</span>
                        <span class="text-gray-400">(${fakeVotes})</span>
                    </div>
                </div>
                <div class="mt-6 flex justify-between items-center pt-4 border-t border-gray-50">
                    <span class="text-2xl font-black text-gray-900">$${item.price}</span>
                    <span class="bg-black text-white text-xs font-bold px-3 py-2 rounded group-hover:bg-blue-600 transition">Configure</span>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
