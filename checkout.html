<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | FutbolGear</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <main class="max-w-xl mx-auto px-4 py-16">
        <div class="bg-white p-8 rounded-2xl shadow-md border border-gray-100">
            <h1 class="text-2xl font-black mb-2 uppercase tracking-wide">Secure Checkout</h1>
            <p class="text-xs text-gray-400 mb-6">Sandbox Environment. Do not input real credit card data.</p>
            
            <form onsubmit="handleCheckout(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Email Address</label>
                    <input type="email" required class="w-full border border-gray-200 rounded p-3 text-sm focus:outline-none focus:border-black">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Shipping Full Name</label>
                    <input type="text" required class="w-full border border-gray-200 rounded p-3 text-sm focus:outline-none focus:border-black">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Street Address</label>
                    <input type="text" required class="w-full border border-gray-200 rounded p-3 text-sm focus:outline-none focus:border-black">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Fake Card Number</label>
                        <input type="text" placeholder="4242 •••• •••• 4242" required class="w-full border border-gray-200 rounded p-3 text-sm focus:outline-none focus:border-black">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Expiry / CVV</label>
                        <input type="text" placeholder="MM/YY 123" required class="w-full border border-gray-200 rounded p-3 text-sm focus:outline-none focus:border-black">
                    </div>
                </div>
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-xl transition text-lg uppercase tracking-wider mt-4 shadow-lg shadow-green-100">
                    Place Simulated Order 🚀
                </button>
            </form>
        </div>
    </main>

    <script>
        function handleCheckout(e) {
            e.preventDefault();
            localStorage.removeItem('cart'); // Clear state on purchase conversion success
            window.location.href = 'thank-you.html';
        }
    </script>
</body>
</html>
